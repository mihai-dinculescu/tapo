name: "Tapo Rust"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "tapo-mcp-v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tapo-mcp

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/checkout@v6
      - name: Run format
        run: cargo make format
      - name: Run check
        run: cargo make check
      - name: Run check doc
        run: cargo make check-doc
      - name: Run clippy
        run: cargo make clippy
      - name: Run test
        run: cargo make test

  checks_min_ver:
    name: Rust checks on the minimum supported version
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: davidB/rust-cargo-make@v1
      - uses: actions/checkout@v6
      - name: Run check on the minimum supported version
        run: cargo +1.88.0 make check

  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    needs: [checks, checks_min_ver]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo login
        run: cargo login ${CRATES_IO_TOKEN}
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      - name: Run build
        run: cargo build --package tapo --release --verbose
      - name: Run cargo publish
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: cargo publish --package tapo

  build:
    name: Build MCP Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [checks, checks_min_ver]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tapo-mcp/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: Prepare platform pair
        if: github.event_name != 'pull_request'
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-ghcr:
    name: Publish MCP Docker image to GHCR
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=tapo-mcp-v(.*),group=1
            type=match,pattern=tapo-mcp-v(\d+\.\d+),group=1
            type=ref,event=branch
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/tapo-mcp-v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/tapo-mcp-v')
    needs: publish-ghcr
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          mv mcp-publisher tapo-mcp/

      - name: Update server.json version
        working-directory: tapo-mcp
        run: |
          VERSION=${GITHUB_REF#refs/tags/tapo-mcp-v}
          jq --arg v "$VERSION" '
            .version = $v |
            .packages[0].identifier = "ghcr.io/${{ env.IMAGE_NAME }}:" + $v
          ' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry
        working-directory: tapo-mcp
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: tapo-mcp
        run: ./mcp-publisher publish
