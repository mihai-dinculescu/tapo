[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
skip_core_tasks = true

[tasks.format]
command = "cargo"
args = ["fmt", "--verbose", "--", "--check"]

[tasks.check]
command = "cargo"
args = ["check", "--verbose"]

[tasks.check-doc]
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--no-deps", "--all-features"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--verbose", "--", "-D", "warnings"]

[tasks.test]
command = "cargo"
args = ["test", "--verbose"]
condition_script = [
    "#!@duckscript",
    "is_py = eq ${CARGO_MAKE_CRATE_NAME} tapo-py",
    "if ${is_py}",
    "exit 1",
    "end",
]

[tasks.ci-flow]
dependencies = ["format", "check", "check-doc", "clippy", "test"]
