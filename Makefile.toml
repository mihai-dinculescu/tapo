[config]
skip_core_tasks = true
default_to_workspace = false

# Tasks run once at the workspace root. `--workspace`/`--all` flags include
# `tapo-py` where safe; bare `cargo test` honors `default-members`, which
# excludes `tapo-py` because linking test binaries and examples against
# `pyo3/extension-module` fails (Python symbols are resolved at runtime).

[tasks.format]
command = "cargo"
args = ["fmt", "--all", "--verbose", "--", "--check"]

[tasks.check]
command = "cargo"
args = ["check", "--workspace", "--verbose"]

[tasks.check-doc]
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--workspace", "--no-deps", "--all-features"]

[tasks.clippy]
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--verbose", "--", "-D", "warnings"]

[tasks.test]
command = "cargo"
args = ["test", "--verbose"]

[tasks.ci-flow]
dependencies = ["format", "check", "check-doc", "clippy", "test"]
